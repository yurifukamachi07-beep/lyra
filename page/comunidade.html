<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>lyra & Care Plus | Comunidade</title>
    <link rel="icon" type="image/x-icon" href="../public/LOGO-VETORIZADA.png" />
    <link rel="stylesheet" href="../style/comunidade.css" />
    <link rel="stylesheet" href="../style/avatar.css" />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap"

        <div class="scroll-content">
            <header class="app-header">
                <h1>Avatar</h1>
                <div class="header-actions" aria-label="Ações do cabeçalho">
                    <div class="badge-points" aria-label="208 pontos acumulados">
                        <span>208</span>
                        <span class="dot"></span>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--green-dark)"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" />
                            <path d="M8 14s1.5-2 4-2 4 2 4 2" />
                            <line x1="9" y1="9" x2="9.01" y2="9" />
                            <line x1="15" y1="9" x2="15.01" y2="9" />

                    </div>
                    <button class="btn-icon" type="button" aria-label="Ver notificações">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"

                            <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path>

                        <a href="./avatar.html" class="tab-pill">Avatar</a>
                        <a href="./vestiario.html" class="tab-pill">Vestiário</a>
                        <a href="./objetivos.html" class="tab-pill">Objetivos</a>
                        <a href="./comunidade.html" class="tab-pill active" aria-current="page">Comunidade</a>
                    </nav>
                </section>

                <section class="section featured-community-section" aria-labelledby="comunidade-destaque-titulo">
                    <h2 id="comunidade-destaque-titulo" class="sr-only">Comunidade em destaque</h2>
                    <article class="featured-community-card">
                        <a href="#" class="featured-community-link" aria-label="Abrir comunidade Care Plus Saúde">
                            <div class="featured-community-logo" aria-hidden="true">
                                <span>Care</span>
                                <span>Plus</span>
                                <svg viewBox="0 0 72 28" fill="none" stroke="currentColor" stroke-width="3"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M2 16h10l4-8 6 16 6-12 5 4h8"></path>
                                    <path d="M49 16h9"></path>
                                </svg>
                            </div>
                            <div class="featured-community-content">
                                <h3>Care Plus</h3>
                                <p>Saúde</p>
                            </div>
                            <span class="featured-community-arrow" aria-hidden="true">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M9 18l6-6-6-6"></path>
                                </svg>
                            </span>
                        </a>
                    </article>
                </section>

                <section class="section groups-section" aria-labelledby="meus-grupos-titulo">
                    <div class="groups-panel">
                        <div class="groups-panel-header">
                            <h2 id="meus-grupos-titulo">Meus Grupos</h2>
                            <button class="add-group-button" type="button" aria-label="Adicionar grupo">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"
                                    stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                    <path d="M12 5v14"></path>
                                    <path d="M5 12h14"></path>
                                </svg>
                            </button>
                        </div>

                        <ul class="groups-list">
                            <li class="group-item">
                                <article class="group-card">
                                    <a href="#" class="group-link" aria-label="Abrir grupo Care Plus RH com 15 pessoas">
                                        <span class="group-avatar" aria-hidden="true"></span>
                                        <div class="group-content">
                                            <h3>Care Plus RH</h3>
                                        </div>
                                        <p class="group-meta">15 Pessoas</p>
                                    </a>
                                </article>
                            </li>

                            <li class="group-item">
                                <article class="group-card">
                                    <a href="#" class="group-link"

                                    </a>
                                </article>
                            </li>

                            <li class="group-item">
                                <article class="group-card">
                                    <a href="#" class="group-link" aria-label="Abrir grupo Care Plus Dev com 7 pessoas">
                                        <span class="group-avatar" aria-hidden="true"></span>
                                        <div class="group-content">
                                            <h3>Care Plus Dev</h3>
                                        </div>
                                        <p class="group-meta">7 Pessoas</p>
                                    </a>
                                </article>
                            </li>
                        </ul>
                    </div>

        <nav class="bottom-nav" aria-label="Navegação principal">
            <a href="../index.html" class="nav-item" aria-label="Início">

                    <polyline points="9 21 9 12 15 12 15 21"></polyline>
                </svg>
                Início
            </a>
            <a href="./resumo.html" class="nav-item" aria-label="Resumo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
                    stroke-linejoin="round" aria-hidden="true">
                    <path d="M21 12c0-4.97-4.03-9-9-9S3 7.03 3 12s4.03 9 9 9"></path>
                    <path d="M12 8v4l3 3"></path>
                    <path d="M18 18l3 3m0-3l-3 3"></path>
                </svg>
                Resumo
            </a>
            <a href="./avatar.html" class="nav-item active" aria-current="page" aria-label="Avatar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
                    stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="8" r="4"></circle>
                    <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"></path>
                </svg>
                Avatar
            </a>
            <a href="../page/loja.html" class="nav-item" aria-label="Loja">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
                    stroke-linejoin="round" aria-hidden="true">
                    <rect x="2" y="7" width="20" height="14" rx="2"></rect>
                    <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"></path>
                    <line x1="12" y1="12" x2="12" y2="16"></line>
                    <line x1="10" y1="14" x2="14" y2="14"></line>
                </svg>
                Loja
            </a>
        </nav>
