<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Passo &amp; Distância</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../style/passos.css" />
</head>
<body>
<div class="app">

    <header class="app-header">
        <a href="resumo.html" class="btn-icon btn-back" aria-label="Voltar">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
        </a>
        <h1>Passo &amp; Distancia</h1>
        <span class="header-spacer" aria-hidden="true"></span>
    </header>

    <main class="scroll-content">

        <section class="section tabs-section" aria-label="Período">
            <nav class="period-tabs" role="tablist">
                <button class="tab-pill tab-sm active" role="tab" aria-selected="true">D</button>
                <button class="tab-pill tab-sm"         role="tab" aria-selected="false">S</button>
                <button class="tab-pill tab-sm"         role="tab" aria-selected="false">M</button>
                <button class="tab-pill tab-sm"         role="tab" aria-selected="false">A</button>
            </nav>
        </section>

        <section class="section chart-section" aria-labelledby="passos-heading">
            <div class="chart-header">
                <h2 class="chart-title" id="passos-heading">Passos</h2>
                <div class="chart-dotted" aria-hidden="true"></div>
                <span class="chart-total">1254</span>
            </div>
            <div class="chart-box" aria-label="Gráfico de barras — passos">
                <div class="bar-chart" aria-hidden="true">
                    <div class="bar" style="--h:35%"></div>
                    <div class="bar" style="--h:55%"></div>
                    <div class="bar" style="--h:42%"></div>
                    <div class="bar" style="--h:70%"></div>
                    <div class="bar" style="--h:85%"></div>
                    <div class="bar" style="--h:60%"></div>
                    <div class="bar" style="--h:78%"></div>
                    <div class="bar" style="--h:90%"></div>
                    <div class="bar" style="--h:65%"></div>
                    <div class="bar" style="--h:48%"></div>
                    <div class="bar" style="--h:30%"></div>
                    <div class="bar" style="--h:20%"></div>
                    <div class="bar" style="--h:15%"></div>
                    <div class="bar" style="--h:10%"></div>
                </div>
                <div class="chart-axis" aria-hidden="true">
                    <span>00</span><span>1254</span>
                </div>
            </div>
        </section>

        <section class="section chart-section" aria-labelledby="distancia-heading">
            <div class="chart-header">
                <h2 class="chart-title" id="distancia-heading">Distancia</h2>
                <div class="chart-dotted" aria-hidden="true"></div>
                <span class="chart-total">4.5km</span>
            </div>
            <div class="chart-box" aria-label="Gráfico de barras — distância">
                <div class="bar-chart" aria-hidden="true">
                    <div class="bar" style="--h:28%"></div>
                    <div class="bar" style="--h:50%"></div>
                    <div class="bar" style="--h:38%"></div>
                    <div class="bar" style="--h:65%"></div>
                    <div class="bar" style="--h:80%"></div>
                    <div class="bar" style="--h:55%"></div>
                    <div class="bar" style="--h:72%"></div>
                    <div class="bar" style="--h:88%"></div>
                    <div class="bar" style="--h:60%"></div>
                    <div class="bar" style="--h:44%"></div>
                    <div class="bar" style="--h:26%"></div>
                    <div class="bar" style="--h:18%"></div>
                    <div class="bar" style="--h:12%"></div>
                    <div class="bar" style="--h:8%"></div>
                </div>
                <div class="chart-axis" aria-hidden="true">
                    <span>00</span><span>4.5</span>
                </div>
            </div>
        </section>

    </main>

        <footer>
            <nav class="bottom-nav">
                <a href="../index.html" class="nav-item" aria-label="Início">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
                        stroke-linejoin="round" aria-hidden="true">
                        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z" />
                        <polyline points="9 21 9 12 15 12 15 21" />
                    </svg>
                    Início
                </a>
                <a href="#" class="nav-item active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
                        stroke-linejoin="round" aria-hidden="true">
                        <path d="M21 12c0-4.97-4.03-9-9-9S3 7.03 3 12s4.03 9 9 9" />
                        <path d="M12 8v4l3 3" />
                        <path d="M18 18l3 3m0-3l-3 3" />
                    </svg>
                    Resumo
                </a>
                <a href="./avatar.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
                        stroke-linejoin="round" aria-hidden="true">
                        <circle cx="12" cy="8" r="4" />
                        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
                    </svg>
                    Avatar
                </a>
                <a href="./loja.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
                        stroke-linejoin="round" aria-hidden="true">
                        <rect x="2" y="7" width="20" height="14" rx="2" />
                        <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2" />
                        <line x1="12" y1="12" x2="12" y2="16" />
                        <line x1="10" y1="14" x2="14" y2="14" />
                    </svg>
                    Loja
                </a>
            </nav>
        </footer>

    </div>

</body>
</html>
