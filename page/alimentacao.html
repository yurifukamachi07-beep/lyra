<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alimentação</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../style/alimentacao.css" />
</head>
<body>
<div class="app">

    <header class="app-header">
        <a href="resumo.html" class="btn-icon btn-back" aria-label="Voltar">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
        </a>
        <h1>Alimentação</h1>
        <span class="header-spacer" aria-hidden="true"></span>
    </header>

    <main class="scroll-content">

        <section class="section summary-row" aria-label="Total de calorias e câmera">
            <div class="cal-total-card">
                <span class="cal-total-label">Calorias totais</span>
                <span class="cal-total-sub">hoje</span>
                <strong class="cal-total-value">1245kcal</strong>
            </div>
            <a href="#" class="camera-card" aria-label="Contabilizar calorias com câmera">
                <div class="camera-card-top">
                    <span class="camera-label">Camera</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                        <circle cx="12" cy="13" r="4"/>
                    </svg>
                </div>
                <p class="camera-desc">Contabilize suas<br/>calorias aqui!</p>
                <span class="camera-arrow" aria-hidden="true">›</span>
            </a>
        </section>

        <section class="section meals-section" aria-labelledby="today-heading">
            <h2 class="day-heading" id="today-heading">Hoje</h2>
            <ul class="meals-list" role="list">

                <li class="meal-item" role="listitem">
                    <div class="meal-thumb" aria-hidden="true">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
                             stroke="var(--green-mid)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 8h1a4 4 0 0 1 0 8h-1"/>
                            <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
                            <line x1="6" y1="1" x2="6" y2="4"/>
                            <line x1="10" y1="1" x2="10" y2="4"/>
                            <line x1="14" y1="1" x2="14" y2="4"/>
                        </svg>
                    </div>
                    <div class="meal-info">
                        <p class="meal-name">Minhas calorias do prato</p>
                        <strong class="meal-cal">260CAL</strong>
                    </div>
                </li>

                <li class="meal-item" role="listitem">
                    <div class="meal-thumb" aria-hidden="true">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
                             stroke="var(--green-mid)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 8h1a4 4 0 0 1 0 8h-1"/>
                            <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
                            <line x1="6" y1="1" x2="6" y2="4"/>
                            <line x1="10" y1="1" x2="10" y2="4"/>
                            <line x1="14" y1="1" x2="14" y2="4"/>
                        </svg>
                    </div>
                    <div class="meal-info">
                        <p class="meal-name">Minhas calorias do prato</p>
                        <strong class="meal-cal">368CAL</strong>
                    </div>
                </li>

                <li class="meal-item" role="listitem">
                    <div class="meal-thumb" aria-hidden="true">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
                             stroke="var(--green-mid)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 8h1a4 4 0 0 1 0 8h-1"/>
                            <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
                            <line x1="6" y1="1" x2="6" y2="4"/>
                            <line x1="10" y1="1" x2="10" y2="4"/>
                            <line x1="14" y1="1" x2="14" y2="4"/>
                        </svg>
                    </div>
                    <div class="meal-info">
                        <p class="meal-name">Minhas calorias do prato</p>
                        <strong class="meal-cal">127CAL</strong>
                    </div>
                </li>

                <li class="meal-item" role="listitem">
                    <div class="meal-thumb" aria-hidden="true">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
                             stroke="var(--green-mid)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 8h1a4 4 0 0 1 0 8h-1"/>
                            <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
                            <line x1="6" y1="1" x2="6" y2="4"/>
                            <line x1="10" y1="1" x2="10" y2="4"/>
                            <line x1="14" y1="1" x2="14" y2="4"/>
                        </svg>
                    </div>
                    <div class="meal-info">
                        <p class="meal-name">Minhas calorias do prato</p>
                        <strong class="meal-cal">200CAL</strong>
                    </div>
                </li>

            </ul>
        </section>

    </main>

        <footer>
            <nav class="bottom-nav">
                    <a href="../index.html" class="nav-item" aria-label="Início">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
                        stroke-linejoin="round" aria-hidden="true">
                        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z" />
                        <polyline points="9 21 9 12 15 12 15 21" />
                    </svg>
                    Início
                </a>
                <a href="#" class="nav-item active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
                        stroke-linejoin="round" aria-hidden="true">
                        <path d="M21 12c0-4.97-4.03-9-9-9S3 7.03 3 12s4.03 9 9 9" />
                        <path d="M12 8v4l3 3" />
                        <path d="M18 18l3 3m0-3l-3 3" />
                    </svg>
                    Resumo
                </a>
                <a href="./avatar.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
                        stroke-linejoin="round" aria-hidden="true">
                        <circle cx="12" cy="8" r="4" />
                        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
                    </svg>
                    Avatar
                </a>
                <a href="./loja.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
                        stroke-linejoin="round" aria-hidden="true">
                        <rect x="2" y="7" width="20" height="14" rx="2" />
                        <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2" />
                        <line x1="12" y1="12" x2="12" y2="16" />
                        <line x1="10" y1="14" x2="14" y2="14" />
                    </svg>
                    Loja
                </a>
            </nav>
        </footer>

</div>
</body>
</html>
