<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loja - lyra & Care Plus</title>
    <link rel="icon" type="image/x-icon" href="../public/LOGO-VETORIZADA.png">
    <link rel="stylesheet" href="../style/index.css" />
    <link rel="stylesheet" href="../style/loja.css" />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap"
        rel="stylesheet" />
</head>

<body>

    <div class="app">
        <div class="scroll-content">
            <header class="app-header">
                <h1>Loja</h1>
                <div class="header-actions">
                    <div class="badge-points">
                        <span>208</span>
                        <span class="dot"></span>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--green-dark)"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" />
                            <path d="M8 14s1.5-2 4-2 4 2 4 2" />
                            <line x1="9" y1="9" x2="9.01" y2="9" />
                            <line x1="15" y1="9" x2="15.01" y2="9" />
                        </svg>
                    </div>
                    <button class="btn-icon" aria-label="Notificações">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9" />
                            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                        </svg>
                    </button>
                </div>
            </header>

            <div class="name-bar" role="region">
                <span>Nome</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="12" r="10" />
                    <polyline points="12 6 12 12 16 14" />
                </svg>
            </div>

            <!-- Seção de Roupas & Skins -->
            <section class="section">
                <div class="section-header">
                    <h2 id="roupas-titulo">Roupas & Skins</h2>
                    <a href="../page/skinsLoja.html" class="link-arrow" aria-label="Ver todas as roupas e skins">→</a>
                </div>

                <article class="shop-card shop-card-featured">
                    <div class="shop-card-image">
                        <img src="../public/buddysLoja.png" alt="Roupas e Skins disponíveis" />
                    </div>
                    <div class="shop-card-content">
                        <h3>Roupas & Skins</h3>
                        <p class="shop-card-price">
                            <span class="price-value">500</span>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                <circle cx="12" cy="12" r="10" />
                                <text x="12" y="15" text-anchor="middle" font-size="12" fill="white" font-weight="bold">◎</text>
                            </svg>
                        </p>
                    </div>
                </article>
            </section>

            <!-- Seção de Personalidade -->
            <section class="section">
                <div class="section-header">
                    <h2 id="personalidade-titulo">Personalidade</h2>
                    <a href="../page/personalidadesLoja.html" class="link-arrow" aria-label="Ver todas as personalizações">→</a>
                </div>

                <article class="shop-card shop-card-secondary">
                    <div class="shop-card-image">
                        <img src="../public/placeholder-personalidade.png" alt="Itens de personalidade" />
                    </div>
                    <div class="shop-card-content">
                        <h3>Personalidade</h3>
                        <p class="shop-card-description">Customize seu avatar com acessórios únicos</p>
                    </div>
                </article>
            </section>

            <!-- Seção de Tags -->
            <section class="section">
                <div class="section-header">
                    <h2 id="tags-titulo">Tags</h2>
                    <a href="../page/tagsLoja.html" class="link-arrow" aria-label="Ver todas as tags">→</a>
                </div>

                <article class="shop-card shop-card-secondary">
                    <div class="shop-card-image">
                        <img src="../public/placeholder-tags.png" alt="Tags disponíveis" />
                    </div>
                    <div class="shop-card-content">
                        <h3>Tags</h3>
                        <p class="shop-card-description">Desbloqueie tags especiais para seu perfil</p>
                    </div>
                </article>
            </section>

            <!-- Seção de Baús -->
            <section class="section">
                <div class="section-header">
                    <h2 id="baus-titulo">Baús</h2>
                    <a href="../page/bausLoja.html" class="link-arrow" aria-label="Ver todos os baús">→</a>
                </div>

                <article class="shop-card shop-card-featured">
                    <div class="shop-card-image">
                        <img src="../public/placeholder-baus.png" alt="Baús com recompensas" />
                    </div>
                    <div class="shop-card-content">
                        <h3>Baús</h3>
                        <p class="shop-card-price">
                            <span class="price-value">500</span>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                <circle cx="12" cy="12" r="10" />
                                <text x="12" y="15" text-anchor="middle" font-size="12" fill="white" font-weight="bold">◎</text>
                            </svg>
                        </p>
                    </div>
                </article>
            </section>

        </div>

        <nav class="bottom-nav">
            <a href="./home.html" class="nav-item" aria-label="Início">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
                    stroke-linejoin="round" aria-hidden="true">
                    <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z" />
                    <polyline points="9 21 9 12 15 12 15 21" />
                </svg>
                Início
            </a>
            <a href="../page/index.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
                    stroke-linejoin="round" aria-hidden="true">
                    <path d="M21 12c0-4.97-4.03-9-9-9S3 7.03 3 12s4.03 9 9 9" />
                    <path d="M12 8v4l3 3" />
                    <path d="M18 18l3 3m0-3l-3 3" />
                </svg>
                Resumo
            </a>
            <a href="../page/avatar.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
                    stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="8" r="4" />
                    <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
                </svg>
                Avatar
            </a>
            <a href="#" class="nav-item active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
                    stroke-linejoin="round" aria-hidden="true">
                    <rect x="2" y="7" width="20" height="14" rx="2" />
                    <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2" />
                    <line x1="12" y1="12" x2="12" y2="16" />
                    <line x1="10" y1="14" x2="14" y2="14" />
                </svg>
                Loja
            </a>
        </nav>

    </div>

</body>

</html>
