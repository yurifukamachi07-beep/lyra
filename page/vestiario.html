<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <link rel="icon" type="image/x-icon" href="../public/LOGO-VETORIZADA.png" />

<body>
    <div class="app">
        <div class="scroll-content">
            <header class="app-header">
                <h1>Avatar</h1>
                <div class="header-actions">
                    <div class="badge-points">

                            <path d="M8 14s1.5-2 4-2 4 2 4 2" />

                    </div>
                    <button class="btn-icon" type="button" aria-label="Ver notificações">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"

                            <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path>
                            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>

                    </button>
                </div>
            </header>

            <main>
                <section class="section avatar-tabs-section" aria-labelledby="avatar-secoes-titulo">
                    <h2 id="avatar-secoes-titulo" class="sr-only">Seções do avatar</h2>
                    <nav class="avatar-tabs" aria-label="Navegação interna do avatar">
                        <a href="./avatar.html" class="tab-pill">Avatar</a>
                        <a href="../page/vestiario.html" class="tab-pill active">Vestiario</a>
                        <a href="../page/objetivos.html" class="tab-pill">Objetivos</a>
                        <a href="../page/comunidade.html" class="tab-pill">Comunidade</a>
                    </nav>
                </section>

                <section class="section hero-section">
                    <h2 id="vestiario-hero-titulo" class="sr-only">Avatar no vestiário</h2>
                    <div class="avatar-stage">
                        <figure class="avatar-figure">
                            <div class="avatar-character">
                                <img src="../public/avatar-lyra.png"
                                    alt="Avatar virtual segurando uma garrafa e acenando" />
                            </div>
                            <figcaption class="sr-only">Avatar central exibido para seleção de itens do vestiário.
                            </figcaption>
                        </figure>
                        <div class="avatar-shadow"></div>
                    </div>
                </section>

                <section class="section wardrobe-section">
                    <h2 id="vestiario-titulo" class="sr-only">Categorias do vestiário</h2>
                    <div class="wardrobe-grid">
                        <article class="wardrobe-card wardrobe-card-green">
                            <a href="#" class="wardrobe-link" aria-label="Abrir categoria Vestuário">
                                <div class="wardrobe-icon" aria-hidden="true">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"
                                        stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M8 4l1.8 2h4.4L16 4l3 2.2-1.5 4.3-1.5-.7V20H8V9.8l-1.5.7L5 6.2 8 4z">
                                        </path>
                                    </svg>
                                </div>
                                <div class="wardrobe-content">
                                    <h3>Vestuário</h3>
                                    <span class="wardrobe-arrow">→</span>
                                </div>

                            </a>
                        </article>

                        <article class="wardrobe-card wardrobe-card-lime">
                            <a href="#" class="wardrobe-link">
                                <div class="wardrobe-icon" aria-hidden="true">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"

                                        <path d="M4 14l4-4 5 5 7-7"></path>
                                        <path d="M15 8h5v5"></path>
                                        <path d="M3 15l4 4h10l4-4"></path>

                                </div>
                                <div class="wardrobe-content">
                                    <h3>Acessórios</h3>
                                    <span class="wardrobe-arrow">→</span>

                                </div>
                            </a>
                        </article>

                        <article class="wardrobe-card wardrobe-card-lime">
                            <a href="#" class="wardrobe-link">
                                <div class="wardrobe-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"
                                        stroke-linecap="round" stroke-linejoin="round">

                                        <circle cx="8" cy="10" r="2"></circle>
                                        <circle cx="16" cy="10" r="2"></circle>
                                        <path d="M10 6c.7-1.5 1.7-2 2-2s1.3.5 2 2"></path>

                                </div>
                                <div class="wardrobe-content">

                                    <span class="wardrobe-arrow">→</span>
                                </div>
                            </a>
                        </article>

                        <article class="wardrobe-card wardrobe-card-green">
                            <a href="#" class="wardrobe-link">
                                <div class="wardrobe-icon">
                                    <svg viewBox="0 0 24 24" fill="currentColor">
                                        <path
                                            d="M10.6 3H5a2 2 0 0 0-2 2v5.6a2 2 0 0 0 .6 1.4l8.4 8.4a2 2 0 0 0 2.8 0l6.2-6.2a2 2 0 0 0 0-2.8L12 3.6A2 2 0 0 0 10.6 3zm-3.1 5A1.5 1.5 0 1 1 9 6.5 1.5 1.5 0 0 1 7.5 8z">

                                    </svg>
                                </div>
                                <div class="wardrobe-content">
                                    <h3>Tags</h3>
                                    <span class="wardrobe-arrow">→</span>

            <a href="../index.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"

                    <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"></path>
                    <polyline points="9 21 9 12 15 12 15 21"></polyline>
                </svg>
                Início
            </a>
            <a href="./resumo.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M21 12c0-4.97-4.03-9-9-9S3 7.03 3 12s4.03 9 9 9"></path>
                    <path d="M12 8v4l3 3"></path>

                Resumo

                    <rect x="2" y="7" width="20" height="14" rx="2"></rect>
                    <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"></path>
